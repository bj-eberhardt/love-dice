name: Pull Request CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  build-lint-e2e:
    name: Build, lint and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup project
        uses: ./.github/actions/setup-node-project

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        id: build
        continue-on-error: true
        run: npm run build

      - name: Lint frontend
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        id: test
        continue-on-error: true
        run: npm run test

      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        env:
          CI: "true"
          E2E_WORKERS: 2
        run: npm run test:ui:headless

      - name: Upload Playwright report
        id: playwright-report-artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn

      - name: Upload test results
        id: test-results-artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: warn

      - name: Create PR comment body
        id: comment-body
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          PLAYWRIGHT_REPORT_URL: ${{ steps.playwright-report-artifact.outputs.artifact-url }}
          TEST_RESULTS_URL: ${{ steps.test-results-artifact.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node .github/workflows/pr-ci-comment.mjs > pr-ci-comment.md

      - name: Replace PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- pr-ci-comment -->';
            const body = fs.readFileSync('pr-ci-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            for (const comment of comments) {
              if (comment.user.type === 'Bot' && comment.body?.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });    


      - name: Fail on unsuccessful checks
        if: >-
          steps.build.outcome != 'success' ||
          steps.lint.outcome != 'success' ||
          steps.test.outcome != 'success' ||
          steps.e2e.outcome != 'success'
        run: exit 1
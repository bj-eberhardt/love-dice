name: Pull Request CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  build-lint-e2e:
    name: Build, lint and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-node-project

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        id: build
        continue-on-error: true
        run: npm run build

      - name: Lint frontend
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        id: test
        continue-on-error: true
        run: npm run test

      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        env:
          CI: "true"
          E2E_WORKERS: "3"
        run: npm run test:ui:headless

      - name: Upload Playwright report
        id: playwright-report-artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn

      - name: Upload test results
        id: test-results-artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: warn


      - name: Fail on unsuccessful checks
        if: >-
          steps.build.outcome != 'success' ||
          steps.lint.outcome != 'success' ||
          steps.test.outcome != 'success' ||
          steps.e2e.outcome != 'success'
        run: exit 1